  - name: AIOps
    skill: aiops
    updated: '2026-03-27'
    description: AIOps applies artificial intelligence and machine learning to IT operations, enabling intelligent alerting, anomaly detection, automated root cause analysis, and predictive incident management.
      This includes AIOps platforms that correlate events across monitoring tools, observability solutions with built-in AI capabilities, incident management platforms that use ML to reduce alert noise
      and accelerate resolution, and anomaly detection tools that identify unusual patterns in metrics, logs, and traces before they become outages.
  - name: AI Automation
    skill: ai-automation
    updated: '2026-03-27'
    description: AI automation combines artificial intelligence with workflow and process automation to create intelligent, autonomous systems. This includes AI agent frameworks that orchestrate multi-step
      reasoning and tool use, autonomous coding agents, AI-powered workflow platforms that add intelligence to integration and automation pipelines, intelligent process automation (IPA) that extends RPA
      with ML and NLP capabilities, and AI orchestration tools that coordinate multiple models and agents to complete complex tasks end-to-end.

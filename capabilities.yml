  - name: Documentation
    skill: documentation
    updated: '2026-03-27'
    description: API documentation covers the tools, frameworks, and platforms used to produce, publish, and maintain human-readable and machine-readable references for APIs. This includes OpenAPI renderers,
      static site generators, developer portals, linting and style-guide tools, and hosted documentation platforms. Good documentation is the primary driver of API adoption and developer experience.

capabilities:
  - name: Aggregation
    skill: aggregation
    updated: '2026-03-27'
    description: >-
      API aggregation brings together APIs from multiple providers into unified
      directories, marketplaces, catalogs, and search engines, making it easier
      for developers to discover, compare, and consume APIs. This includes API
      marketplaces that let providers list and monetize their APIs, directories
      and registries that catalog publicly available APIs, discovery tools that
      crawl and index API definitions, and aggregation platforms that unify
      multiple provider APIs behind a single normalized interface for categories
      like accounting, CRM, HRIS, and payments.

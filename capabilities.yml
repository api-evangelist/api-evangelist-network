name: API Platform Capabilities
description: The capability areas that make up a modern API platform, each mapped to the tools and services that support it.
url: https://raw.githubusercontent.com/api-evangelist/network/refs/heads/main/capabilities.yml
source: https://apievangelist.com/2017/08/16/the-85-stops-along-the-api-lifecycle-i-track-on/
created: '2026-03-16'
modified: '2026-03-27'
total: 76
capabilities:
  - name: Aggregation
    skill: aggregation
    updated: '2026-03-27'
    description: API aggregation brings together APIs from multiple providers into unified directories, marketplaces, catalogs, and search engines, making it easier for developers to discover, compare,
      and consume APIs. This includes API marketplaces that let providers list and monetize their APIs, directories and registries that catalog publicly available APIs, discovery tools that crawl and index
      API definitions, and aggregation platforms that unify multiple provider APIs behind a single normalized interface for categories like accounting, CRM, HRIS, and payments.
  - name: Analysis
    skill: analysis
    updated: '2026-03-27'
    description: API analysis encompasses the tools and platforms used to understand API usage, performance, behavior, and quality. This includes API analytics platforms that track consumption and traffic
      patterns, observability tools that provide metrics and tracing, product analytics that measure developer adoption, traffic analysis tools for debugging and inspection, design analysis and linting
      tools that enforce API standards, and security analysis platforms that detect threats and vulnerabilities in API traffic.
  - name: Authentication
    skill: authentication
    updated: '2026-03-27'
    description: Authentication and authorization are the gatekeepers of every API, covering how consumers prove their identity and how access is granted or denied. This spans protocols and standards such
      as OAuth 2.0, OpenID Connect, SAML, and SCIM, through to identity providers, single sign-on platforms, privileged access management, secrets management, MFA, and passwordless solutions. Effective
      authentication is foundational to API security, developer experience, and regulatory compliance.

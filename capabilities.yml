  - name: Design
    skill: design
    updated: '2026-03-27'
    description: API design covers the tools, specification languages, and platforms used to model, author, lint, and govern API interfaces before implementation. This includes visual API editors, specification
      languages like OpenAPI, AsyncAPI, GraphQL SDL, and gRPC/Protobuf, linting and style guide enforcement tools, schema registries, governance platforms, and design-first frameworks that generate code
      and documentation from API descriptions.

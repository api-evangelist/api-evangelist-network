  - name: Clients
    skill: clients
    updated: '2026-03-27'
    description: API clients are tools, libraries, and extensions that enable developers to send HTTP requests, test APIs, and consume API services. This includes GUI desktop clients like Postman, Insomnia,
      and Bruno, CLI tools like curl and HTTPie, IDE extensions like Thunder Client and REST Client, and HTTP libraries like Axios, Requests, and OkHttp for programmatic API consumption across multiple
      languages and platforms.
  - name: Command Line Interface
    skill: cli
    updated: '2026-03-27'
    description: API command line interfaces are terminal-based tools that let developers interact with, test, manage, and automate APIs from the shell. This includes general-purpose HTTP clients like curl
      and HTTPie, API-specific CLIs from cloud providers and SaaS platforms, specification linting and validation CLIs, and infrastructure management tools. CLIs are essential for scripting, CI/CD pipelines,
      local development, and automation workflows across the API lifecycle.
  - name: Communications
    skill: communications
    updated: '2026-03-29'
  - name: Containers
    skill: containers
    updated: '2026-03-27'
    description: Containers package applications and their dependencies into lightweight, portable units that run consistently across environments. The container ecosystem spans runtimes that execute containers,
      orchestrators that manage them at scale, registries that store and distribute images, build tools that create images from source code, security scanners that detect vulnerabilities, networking plugins
      that connect containers, and standards bodies like OCI that ensure interoperability. Cloud providers offer managed container services for running workloads without managing infrastructure, while GitOps
      tools automate deployment from version-controlled declarations.

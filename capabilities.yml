    skill: analysis
    updated: '2026-03-27'
    description: >-
      API analysis encompasses the tools and platforms used to understand API
      usage, performance, behavior, and quality. This includes API analytics
      platforms that track consumption and traffic patterns, observability
      tools that provide metrics and tracing, product analytics that measure
      developer adoption, traffic analysis tools for debugging and inspection,
      design analysis and linting tools that enforce API standards, and
      security analysis platforms that detect threats and vulnerabilities
      in API traffic.

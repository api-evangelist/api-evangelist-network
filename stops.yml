  - name: Gateways
    description: >-
      API gateways are the primary entry point for API traffic, sitting between
      clients and backend services to handle routing, authentication, rate
      limiting, transformation, and observability. They range from open-source
      reverse proxies and cloud-native ingress controllers to full enterprise
      API management platforms with developer portals, analytics, and
      monetization. Service meshes extend gateway concepts to service-to-service
      communication inside the cluster, while AI gateways add model routing and
      governance for LLM workloads.
    repos:

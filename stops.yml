  - name: Containers
    description: >-
      Containers package applications and their dependencies into lightweight,
      portable units that run consistently across environments. The container
      ecosystem spans runtimes that execute containers, orchestrators that manage
      them at scale, registries that store and distribute images, build tools
      that create images from source code, security scanners that detect
      vulnerabilities, networking plugins that connect containers, and standards
      bodies like OCI that ensure interoperability. Cloud providers offer managed
      container services for running workloads without managing infrastructure,
      while GitOps tools automate deployment from version-controlled
      declarations.

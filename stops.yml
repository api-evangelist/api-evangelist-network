  - name: Authentication
    description: >-
      Authentication and authorization are the gatekeepers of every API,
      covering how consumers prove their identity and how access is granted
      or denied. This spans protocols and standards such as OAuth 2.0, OpenID
      Connect, SAML, and SCIM, through to identity providers, single sign-on
      platforms, privileged access management, secrets management, MFA, and
      passwordless solutions. Effective authentication is foundational to API
      security, developer experience, and regulatory compliance.

  - name: SDKs
    description: >-
      API SDKs are client libraries and code generation tools that provide
      language-native interfaces for consuming APIs. They range from
      auto-generated clients produced by tools like OpenAPI Generator,
      Speakeasy, Stainless, and Fern, to hand-crafted SDKs maintained by
      API providers. This category also covers RPC frameworks like gRPC
      and schema-driven code generation tools that produce type-safe
      client and server code from API specifications.

- slug: mqtt
  name: MQTT
  description: 'MQTT (Message Queuing Telemetry Transport) is an OASIS-standard, lightweight publish/subscribe messaging transport protocol designed for constrained devices and low-bandwidth, high-latency,
    or unreliable networks, making it the de-facto messaging protocol for IoT and machine-to-machine (M2M) communication. MQTT is a protocol specification rather than a hosted API: clients connect over
    TCP/TLS (typically port 1883 or 8883) or WebSocket (8080/8081) to an MQTT broker (such as Mosquitto, HiveMQ, EMQX, or AWS IoT Core) and exchange CONNECT, PUBLISH, SUBSCRIBE, and other control packets
    defined by the standard. The current standard is MQTT Version 5.0 (OASIS Standard, 7 March 2019); MQTT 3.1.1 remains widely deployed.'
